name: dsmes_mobile
description: "DSMES Aceh - Aplikasi mobile manajemen diabetes untuk pasien dan tenaga kesehatan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Networking
  dio: ^5.7.0


  # Utils
  equatable: ^2.0.7
  intl: ^0.20.2
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

  # Environment
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env.local
    - .env.development.local
    - .env.staging.local
    - .env.production.local
    - assets/images/
    - assets/icons/
